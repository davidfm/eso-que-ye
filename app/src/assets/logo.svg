<svg xmlns="http://www.w3.org/2000/svg" id="load-screen-title" viewBox="0 0 512 110"
     preserveAspectRatio="xMidYMid meet">
    <g id="logo-text-g">
        <text x="256" y="62" text-anchor="middle"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="52" font-weight="bold"
              letter-spacing="1">Eso qué ye?</text>
        <text x="256" y="92" text-anchor="middle"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="16" font-style="italic"
              letter-spacing="0.5">Powered by FolkFriend</text>
    </g>
    <style>
        #logo-text-g > * {
            opacity: 0;
            fill: #055581;
            animation: logo 0.6s ease-out 0.2s forwards;
        }

        @keyframes logo {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</svg>
